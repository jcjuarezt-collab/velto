  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #2d1a4a; --accent: #47C5A8; --accent-dark: #35a08a;
      --accent-light: rgba(71,197,168,0.12); --danger: #e05c3a;
      --danger-light: #fde8e4; --warning: #f59e0b; --success: #10b981;
      --success-light: #d1fae5; --bg: #f2f0f6; --card: #fff;
      --text: #1a1a2e; --muted: #6b7280; --border: #e5e7eb;
    }
    html, body { height: 100%; }
    body { background: #120c1f; font-family: 'Inter', system-ui, sans-serif; color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    #root { width: 100%; max-width: 430px; height: 100vh; background: var(--bg); position: relative; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 0 100px rgba(71,197,168,0.08), 0 0 40px rgba(0,0,0,0.6); }
    @media (min-width: 600px) { #root { border-radius: 40px; height: 90vh; } body { padding: 20px; } }
    .scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .scroll-area::-webkit-scrollbar { display: none; }
    .bottom-nav { display: flex; align-items: center; background: var(--card); border-top: 1px solid var(--border); height: 64px; flex-shrink: 0; position: relative; z-index: 20; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; cursor: pointer; border: none; background: none; color: var(--muted); font-family: inherit; font-size: 10px; font-weight: 500; padding: 6px 4px; transition: color 0.2s; -webkit-tap-highlight-color: transparent; }
    .nav-item.active { color: var(--primary); }
    .nav-item svg { width: 22px; height: 22px; }
    .nav-fab-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .nav-fab { width: 52px; height: 52px; border-radius: 50%; background: linear-gradient(135deg, #3d2a5a 0%, var(--primary) 100%); display: flex; align-items: center; justify-content: center; cursor: pointer; border: 3px solid var(--bg); box-shadow: 0 4px 20px rgba(45,26,74,0.45); margin-top: -16px; transition: transform 0.15s; }
    .nav-fab:active { transform: scale(0.93); }
    .card { background: var(--card); border-radius: 20px; box-shadow: 0 1px 6px rgba(0,0,0,0.05); }
    .btn-primary { background: var(--primary); color: white; border: none; border-radius: 14px; height: 52px; font-family: inherit; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%; transition: opacity 0.2s, transform 0.1s; }
    .btn-primary:active { transform: scale(0.98); opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.4; cursor: default; }
    .btn-danger { background: var(--danger); color: white; border: none; border-radius: 14px; height: 48px; font-family: inherit; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; }
    .btn-outline { background: transparent; color: var(--text); border: 1.5px solid var(--border); border-radius: 14px; height: 48px; font-family: inherit; font-size: 15px; font-weight: 500; cursor: pointer; width: 100%; }
    .btn-outline-danger { background: transparent; color: var(--danger); border: 1.5px solid rgba(224,92,58,0.35); border-radius: 14px; height: 48px; font-family: inherit; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; }
    .input { width: 100%; height: 50px; border: 1.5px solid var(--border); border-radius: 12px; padding: 0 16px; font-family: inherit; font-size: 15px; color: var(--text); background: white; outline: none; transition: border-color 0.2s, box-shadow 0.2s; -webkit-appearance: none; }
    .input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(45,26,74,0.08); }
    .segmented { display: flex; background: rgba(255,255,255,0.1); border-radius: 12px; padding: 3px; gap: 2px; }
    .seg-btn { flex: 1; height: 34px; border-radius: 9px; border: none; font-family: inherit; font-size: 13px; font-weight: 500; cursor: pointer; background: transparent; color: rgba(255,255,255,0.55); transition: all 0.2s; }
    .seg-btn.active { background: white; color: var(--primary); font-weight: 700; box-shadow: 0 1px 6px rgba(0,0,0,0.12); }
    .progress-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 4px; transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1); }
    .chip { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .chip-accent { background: var(--accent-light); color: var(--accent-dark); }
    .chip-danger { background: var(--danger-light); color: var(--danger); }
    .chip-primary { background: rgba(45,26,74,0.08); color: var(--primary); }
    .chip-warn { background: #fef3c7; color: #b45309; }
    .chip-success { background: var(--success-light); color: #065f46; }
    @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes obSlide { from { opacity:0; transform:translateX(40px); } to { opacity:1; transform:translateX(0); } }
    .anim-fade { animation: fadeSlideIn 0.35s ease both; }
    .anim-scale { animation: scaleIn 0.3s ease both; }
    .anim-ob { animation: obSlide 0.4s ease both; }
    .filter-pill { padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1.5px solid var(--border); background: transparent; color: var(--muted); font-family: inherit; transition: all 0.2s; white-space: nowrap; }
    .filter-pill.active { background: var(--primary); border-color: var(--primary); color: white; font-weight: 600; }
    .row-divider { height: 1px; background: var(--border); margin: 0 14px; }
    .sheet-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.45); z-index: 50; display: flex; align-items: flex-end; animation: fadeIn 0.2s ease; }
    .sheet-panel { background: white; border-radius: 24px 24px 0 0; width: 100%; max-height: 90%; overflow-y: auto; animation: slideUp 0.32s cubic-bezier(0.32,0.72,0,1); padding-bottom: 32px; }
    .sheet-panel::-webkit-scrollbar { display: none; }
    .sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 10px auto 4px; }
    .color-swatch { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: transform 0.15s; }
    .color-swatch.selected { border-color: var(--text); transform: scale(1.15); }
    .label { font-size: 13px; font-weight: 600; color: var(--text); display: block; margin-bottom: 7px; }
    .form-row { margin-bottom: 18px; }

// ── CHARTS ───────────────────────────────────────────────────────────────────
const Sparkline = ({ data, color=C.accent, height=60 }) => {
  const max=Math.max(...data),min=Math.min(...data),rng=(max-min)||1;
  const W=260,H=height-10;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*W},${H-((v-min)/rng)*H}`);
  const path=`M ${pts.join(' L ')}`;
  const area=`${path} L ${W},${H} L 0,${H} Z`;
  const lastY=H-((data[data.length-1]-min)/rng)*H;
  return (
    <svg viewBox={`0 0 ${W} ${height}`} width="100%" style={{display:'block'}}>
      <defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.28"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
      <path d={area} fill="url(#sg)"/>
      <path d={path} stroke={color} strokeWidth="2.5" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
      <circle cx={W} cy={lastY} r="4.5" fill={color} stroke="white" strokeWidth="2.5"/>
    </svg>
  );
};
const BarChart = ({ income, expenses, labels }) => {
  const max=Math.max(...income,...expenses);
  const H=80,bW=9,gap=3,gW=bW*2+gap,totalW=labels.length*(gW+10);
  return (
    <svg viewBox={`0 0 ${totalW} ${H+18}`} width="100%" style={{display:'block'}}>
      {labels.map((lbl,i)=>{
        const x=i*(gW+10),ih=(income[i]/max)*H,eh=(expenses[i]/max)*H;
        return <g key={i} transform={`translate(${x},0)`}>
          <rect x={0} y={H-ih} width={bW} height={ih} rx="3" fill={C.primary} fillOpacity="0.75"/>
          <rect x={bW+gap} y={H-eh} width={bW} height={eh} rx="3" fill={C.accent}/>
          <text x={gW/2} y={H+14} textAnchor="middle" fontSize="9" fill={C.muted} fontFamily="Inter,sans-serif">{lbl}</text>
        </g>;
      })}
    </svg>
  );
};
const Donut = ({ segments, size=108 }) => {
  const r=38,cx=size/2,cy=size/2,circ=2*Math.PI*r;
  let off=0;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="#ede9f4" strokeWidth="16"/>
      {segments.map((s,i)=>{const dash=(s.pct/100)*circ;const el=<circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={s.color} strokeWidth="16" strokeDasharray={`${dash} ${circ-dash}`} strokeDashoffset={-off} transform={`rotate(-90 ${cx} ${cy})`}/>;off+=dash;return el;})}
      <circle cx={cx} cy={cy} r={28} fill="white"/>
    </svg>
  );
};

// ── 1. ONBOARDING ─────────────────────────────────────────────────────────────
const OnboardingScreen = ({ onDone }) => {
  const [step, setStep] = useState(0);
  const slides = [
    { emoji:'💸', title:'¿A dónde va tu dinero?',    sub:'Velto registra cada peso y te muestra el panorama completo de tus finanzas.' },

  ];
  const s = slides[step];
  const next = () => step < slides.length - 1 ? setStep(step+1) : onDone();

        <div style={{display:'flex',gap:6,position:'absolute',bottom:24}}>
          {slides.map((_,i)=>(
            <div key={i} onClick={()=>setStep(i)} style={{width:i===step?24:8,height:8,borderRadius:4,background:i===step?C.accent:'rgba(255,255,255,0.25)',cursor:'pointer',transition:'all 0.3s'}}/>

        </div>

        <button onClick={onDone} style={{position:'absolute',top:20,right:20,background:'rgba(255,255,255,0.12)',border:'none',color:'rgba(255,255,255,0.6)',fontSize:13,fontWeight:500,fontFamily:'inherit',padding:'6px 14px',borderRadius:20,cursor:'pointer'}}>Omitir</button>
      </div>
      {/* Content */}
      <div style={{flex:1,padding:'32px 28px 40px',display:'flex',flexDirection:'column'}}>
        <div key={step} className="anim-fade">
          <div style={{fontSize:26,fontWeight:800,color:C.text,lineHeight:1.2,marginBottom:12,letterSpacing:'-0.5px'}}>{s.title}</div>
          <div style={{fontSize:15,color:C.muted,lineHeight:1.65}}>{s.sub}</div>
        </div>
        <div style={{flex:1}}/>
        <button className="btn-primary" onClick={next} style={{marginBottom:14}}>
          {step<slides.length-1?'Siguiente →':'Comenzar con Velto'}
        </button>
        {step<slides.length-1 && (
          <button className="btn-outline" onClick={onDone}>Ya tengo cuenta</button>
        )}
      </div>
    </div>
  );
};

const TransactionsScreen = ({ txns, budgets, setScreen, onTxnClick, onBudgetEdit, onBudgetNew }) => {
  const [tab,setTab]=useState('txns');

  const filtered=txns.filter(t=>{
    if(filter==='Gastos'&&t.type!=='expense')return false;
    if(filter==='Ingresos'&&t.type!=='income')return false;
    if(q&&!t.name.toLowerCase().includes(q.toLowerCase())&&!t.cat.toLowerCase().includes(q.toLowerCase()))return false;
    return true;
  });
  const grouped=groupByDate(filtered);
  const totalB=budgets.reduce((s,b)=>s+b.budget,0);
  const totalS=budgets.reduce((s,b)=>s+b.spent,0);
  return (
    <div className="anim-fade" style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{background:`linear-gradient(160deg,${C.primaryDark},${C.primary})`,padding:'48px 20px 20px',flexShrink:0}}>

          <button className={`seg-btn ${tab==='txns'?'active':''}`} onClick={()=>setTab('txns')}>Transacciones</button>

          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {budgets.map((b)=>{

// ── NEW / EDIT TRANSACTION ────────────────────────────────────────────────────
const NewScreen = ({ editTxn, onSave, onDelete, onClose }) => {
  const [type,setType]=useState(editTxn?.type||'expense');
  const [amount,setAmount]=useState(editTxn?String(Math.abs(editTxn.amount)):'');
  const [name,setName]=useState(editTxn?.name||'');
  const [cat,setCat]=useState(editTxn?.cat||'');
  const [date,setDate]=useState(editTxn?.date||'2026-04-22');
  const [note,setNote]=useState(editTxn?.note||'');
  const [saved,setSaved]=useState(false);
  const [confirmDel,setConfirmDel]=useState(false);
  const expCats=['Comida','Transporte','Entretenimiento','Salud','Ropa','Streaming','Café','Otros'];
  const incCats=['Nómina','Freelance','Inversión','Transferencia','Otro'];
  const cats=type==='expense'?expCats:incCats;
  const canSave=amount&&name&&cat;
  const isEdit=!!editTxn;

  const save=()=>{
    const txn={
      id:editTxn?.id||Date.now(),
      name,cat,date,note,type,
      amount:type==='expense'?-Math.abs(Number(amount)):Math.abs(Number(amount)),
      icon:editTxn?.icon||(type==='income'?'💰':'💸'),
    };
    setSaved(true);
    setTimeout(()=>onSave(txn),800);
  };

  if(saved) return (
    <div className="anim-scale" style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'white',gap:14}}>
      <div style={{width:76,height:76,borderRadius:'50%',background:C.accentLight,display:'flex',alignItems:'center',justifyContent:'center',color:C.accent}}><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
      <div style={{fontSize:22,fontWeight:800,color:C.text}}>{isEdit?'¡Actualizado!':'¡Guardado!'}</div>
      <div style={{fontSize:14,color:C.muted}}>Tu transacción fue {isEdit?'actualizada':'registrada'}.</div>
    </div>
  );

  return (
    <div className="anim-fade" style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',background:'white'}}>
      <div style={{background:`linear-gradient(160deg,${C.primaryDark},${C.primary})`,padding:'48px 20px 24px',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:18}}>
          <button onClick={onClose} style={{width:38,height:38,borderRadius:11,background:'rgba(255,255,255,0.1)',border:'none',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'rgba(255,255,255,0.8)',flexShrink:0}}><I.Close/></button>
          <div style={{fontSize:20,fontWeight:800,color:'white'}}>{isEdit?'Editar transacción':'Nueva transacción'}</div>
        </div>
        <div className="segmented">
          <button className={`seg-btn ${type==='expense'?'active':''}`} onClick={()=>{setType('expense');setCat('');}} style={{color:type==='expense'?C.danger:'rgba(255,255,255,0.55)',background:type==='expense'?'white':'transparent'}}>Gasto</button>
          <button className={`seg-btn ${type==='income'?'active':''}`} onClick={()=>{setType('income');setCat('');}} style={{color:type==='income'?C.accentDark:'rgba(255,255,255,0.55)',background:type==='income'?'white':'transparent'}}>Ingreso</button>
        </div>
      </div>
      <div className="scroll-area" style={{padding:'24px 20px 32px',background:'white'}}>
        <div style={{textAlign:'center',marginBottom:28}}>
          <div style={{fontSize:13,color:C.muted,marginBottom:8,fontWeight:500}}>Monto en MXN</div>
          <input style={{border:'none',outline:'none',fontSize:52,fontWeight:800,color:type==='expense'?C.danger:C.accentDark,textAlign:'center',width:'100%',fontFamily:'Inter,sans-serif',background:'transparent',letterSpacing:'-1px'}} placeholder="$0" value={amount} onChange={e=>setAmount(e.target.value)} type="number" inputMode="decimal"/>
        </div>
        <div className="form-row">
          <label className="label">Descripción</label>
          <input className="input" placeholder={type==='expense'?'ej. Starbucks, Uber, Walmart...':'ej. Nómina, cliente freelance...'} value={name} onChange={e=>setName(e.target.value)}/>
        </div>
        <div className="form-row">
          <label className="label">Categoría</label>
          <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
            {cats.map(c=><button key={c} onClick={()=>setCat(c)} style={{padding:'8px 18px',borderRadius:20,border:`1.5px solid ${cat===c?C.primary:C.border}`,background:cat===c?C.primary:'transparent',color:cat===c?'white':C.text,fontSize:14,fontWeight:cat===c?600:500,cursor:'pointer',fontFamily:'inherit',transition:'all 0.18s'}}>{c}</button>)}
          </div>
        </div>
        <div className="form-row">
          <label className="label">Fecha</label>
          <input className="input" type="date" value={date} onChange={e=>setDate(e.target.value)}/>
        </div>
        <div className="form-row">
          <label className="label">Nota <span style={{color:C.muted,fontWeight:400}}>(opcional)</span></label>
          <input className="input" placeholder="Agrega un detalle..." value={note} onChange={e=>setNote(e.target.value)}/>
        </div>
        <button className="btn-primary" onClick={save} disabled={!canSave} style={{marginBottom:isEdit?12:0}}>
          {isEdit?'Actualizar transacción':'Guardar transacción'}

        {isEdit&&!confirmDel&&(
          <button className="btn-outline-danger" onClick={()=>setConfirmDel(true)}>Eliminar transacción</button>

            </div>
          </div>
        )}
      </div>
    </div>
  );
};

            <label className="label">Ícono</label>
            <input className="input" placeholder="Escribe un emoji" value={icon} onChange={e=>setIcon(e.target.value)} style={{fontSize:22}}/>
          </div>
          <div className="form-row">
            <label className="label">Límite mensual (MXN)</label>
            <input className="input" type="number" placeholder="ej. 5000" value={limit} onChange={e=>setLimit(e.target.value)} inputMode="numeric"/>
          </div>
          <div className="form-row">
            <label className="label">Color</label>
            <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
              {SWATCHES.map(sw=><div key={sw} className={`color-swatch ${color===sw?'selected':''}`} style={{background:sw}} onClick={()=>setColor(sw)}/>)}
            </div>
          </div>
          <button className="btn-primary" onClick={save} disabled={!canSave} style={{marginBottom:isEdit?10:0}}>
            {isEdit?'Actualizar presupuesto':'Crear presupuesto'}
          </button>
          {isEdit&&!confirmDel&&(
            <button className="btn-outline-danger" onClick={()=>setConfirmDel(true)} style={{marginTop:10}}>Eliminar categoría</button>
          )}
          {isEdit&&confirmDel&&(
            <div style={{marginTop:10,padding:'14px',background:'#fff5f5',border:'1.5px solid rgba(224,92,58,0.25)',borderRadius:14}}>
              <div style={{fontSize:14,fontWeight:600,color:C.danger,marginBottom:10}}>¿Eliminar "{budget.name}"?</div>
              <div style={{display:'flex',gap:8}}>
                <button onClick={()=>onDelete(budget.id)} className="btn-danger" style={{flex:1,height:40,borderRadius:10,fontSize:14}}>Eliminar</button>
                <button onClick={()=>setConfirmDel(false)} className="btn-outline" style={{flex:1,height:40,borderRadius:10,fontSize:14}}>Cancelar</button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

// ── GOAL FORM SHEET ───────────────────────────────────────────────────────────
const GoalSheet = ({ goal, onSave, onDelete, onClose }) => {
  const [name,setName]=useState(goal?.name||'');
  const [icon,setIcon]=useState(goal?.icon||'🎯');
  const [target,setTarget]=useState(goal?String(goal.target):'');
  const [saved,setSaved2]=useState(goal?String(goal.saved):'0');
  const [deadline,setDeadline]=useState(goal?.deadline||'2026-12-31');
  const [color,setColor]=useState(goal?.color||C.accent);
  const [confirmDel,setConfirmDel]=useState(false);
  const isEdit=!!goal;
  const canSave=name&&target;
  const save=()=>onSave({id:goal?.id||Date.now(),name,icon,target:Number(target),saved:Number(saved),deadline,color});
  return (
    <div className="sheet-overlay" onClick={onClose}>
      <div className="sheet-panel" onClick={e=>e.stopPropagation()}>
        <div className="sheet-handle"/>
        <div style={{padding:'8px 20px 0'}}>
          <div style={{fontSize:18,fontWeight:800,color:C.text,marginBottom:20}}>{isEdit?'Editar meta':'Nueva meta'}</div>
          <div className="form-row">
            <label className="label">Nombre</label>
            <input className="input" placeholder="ej. Vacaciones, Emergencia..." value={name} onChange={e=>setName(e.target.value)}/>
          </div>
          <div className="form-row">
            <label className="label">Ícono</label>
            <input className="input" placeholder="Emoji" value={icon} onChange={e=>setIcon(e.target.value)} style={{fontSize:22}}/>
          </div>
          <div style={{display:'flex',gap:12,marginBottom:18}}>
            <div style={{flex:1}}>
              <label className="label">Meta total (MXN)</label>
              <input className="input" type="number" placeholder="30000" value={target} onChange={e=>setTarget(e.target.value)} inputMode="numeric"/>
            </div>
            <div style={{flex:1}}>
              <label className="label">Ya ahorrado</label>
              <input className="input" type="number" placeholder="0" value={saved} onChange={e=>setSaved2(e.target.value)} inputMode="numeric"/>
            </div>
          </div>
          <div className="form-row">
            <label className="label">Fecha límite</label>
            <input className="input" type="date" value={deadline} onChange={e=>setDeadline(e.target.value)}/>
          </div>
          <div className="form-row">
            <label className="label">Color</label>
            <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
              {SWATCHES.map(sw=><div key={sw} className={`color-swatch ${color===sw?'selected':''}`} style={{background:sw}} onClick={()=>setColor(sw)}/>)}
            </div>
          </div>
          <button className="btn-primary" onClick={save} disabled={!canSave} style={{marginBottom:isEdit?10:0}}>
            {isEdit?'Actualizar meta':'Crear meta'}
          </button>
          {isEdit&&!confirmDel&&(
            <button className="btn-outline-danger" onClick={()=>setConfirmDel(true)} style={{marginTop:10}}>Eliminar meta</button>
          )}
          {isEdit&&confirmDel&&(
            <div style={{marginTop:10,padding:'14px',background:'#fff5f5',border:'1.5px solid rgba(224,92,58,0.25)',borderRadius:14}}>
              <div style={{fontSize:14,fontWeight:600,color:C.danger,marginBottom:10}}>¿Eliminar "{goal.name}"?</div>
              <div style={{display:'flex',gap:8}}>
                <button onClick={()=>onDelete(goal.id)} className="btn-danger" style={{flex:1,height:40,borderRadius:10,fontSize:14}}>Eliminar</button>
                <button onClick={()=>setConfirmDel(false)} className="btn-outline" style={{flex:1,height:40,borderRadius:10,fontSize:14}}>Cancelar</button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

// ── APP ROOT ──────────────────────────────────────────────────────────────────
function App() {
  const [onboarded,setOnboarded]=useState(()=>localStorage.getItem('v_ob')==='1');
  const [loggedIn,setLoggedIn]=useState(false);
  const [screen,setScreen]=useState('dashboard');
  const [txns,setTxns]=useState(INIT_TXNS);
  const [budgets,setBudgets]=useState(INIT_BUDGETS);
  const [goals,setGoals]=useState(INIT_GOALS);
  const [txnDetail,setTxnDetail]=useState(null);
  const [editTxn,setEditTxn]=useState(null);
  const [budgetForm,setBudgetForm]=useState(null);
  const [goalForm,setGoalForm]=useState(null);

  const saveTxn=t=>{ if(t.id&&txns.find(x=>x.id===t.id)){setTxns(p=>p.map(x=>x.id===t.id?t:x));}else{setTxns(p=>[{...t,id:Date.now()},...p]);} };
  const deleteTxn=id=>setTxns(p=>p.filter(t=>t.id!==id));
  const saveBudget=b=>{ if(b.id&&budgets.find(x=>x.id===b.id)){setBudgets(p=>p.map(x=>x.id===b.id?b:x));}else{setBudgets(p=>[...p,{...b,id:Date.now()}]);} };
  const deleteBudget=id=>setBudgets(p=>p.filter(b=>b.id!==id));
  const saveGoal=g=>{ if(g.id&&goals.find(x=>x.id===g.id)){setGoals(p=>p.map(x=>x.id===g.id?g:x));}else{setGoals(p=>[...p,{...g,id:Date.now()}]);} };
  const deleteGoal=id=>setGoals(p=>p.filter(g=>g.id!==id));

  if(!onboarded) return <OnboardingScreen onDone={()=>{localStorage.setItem('v_ob','1');setOnboarded(true);}}/>;
  if(!loggedIn)  return <LoginScreen onLogin={()=>setLoggedIn(true)}/>;

  const hideNav = screen==='new'||screen==='edit-txn'||screen==='goals';

  let mainContent;
  if(screen==='new'){
    mainContent=<NewScreen onSave={t=>{saveTxn(t);setScreen('dashboard');}} onClose={()=>setScreen('dashboard')}/>;
  } else if(screen==='edit-txn'&&editTxn){
    mainContent=<NewScreen editTxn={editTxn} onSave={t=>{saveTxn(t);setEditTxn(null);setScreen('transactions');}} onDelete={id=>{deleteTxn(id);setEditTxn(null);setScreen('transactions');}} onClose={()=>{setEditTxn(null);setScreen('transactions');}}/>;
  } else if(screen==='goals'){
    mainContent=<GoalsScreen goals={goals} setScreen={setScreen} onNew={()=>setGoalForm('new')} onEdit={g=>setGoalForm(g)}/>;
  } else {
    switch(screen){
      case 'dashboard':    mainContent=<DashboardScreen txns={txns} setScreen={setScreen} onTxnClick={setTxnDetail}/>; break;
      case 'transactions': mainContent=<TransactionsScreen txns={txns} budgets={budgets} setScreen={setScreen} onTxnClick={setTxnDetail} onBudgetEdit={b=>setBudgetForm(b)} onBudgetNew={()=>setBudgetForm('new')}/>; break;
      case 'reports':      mainContent=<ReportsScreen/>; break;
      case 'profile':      mainContent=<ProfileScreen logout={()=>{setLoggedIn(false);setScreen('dashboard');}} setScreen={setScreen}/>; break;
      default:             mainContent=<DashboardScreen txns={txns} setScreen={setScreen} onTxnClick={setTxnDetail}/>;
    }
  }

  return (
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',position:'relative'}}>
      <div key={screen} style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',position:'relative'}}>
        {mainContent}
        {/* Overlays */}
        {txnDetail&&<TxnDetailSheet txn={txnDetail} onClose={()=>setTxnDetail(null)} onEdit={t=>{setTxnDetail(null);setEditTxn(t);setScreen('edit-txn');}}/>}
        {budgetForm&&<BudgetFormSheet budget={budgetForm==='new'?null:budgetForm} onSave={b=>{saveBudget(b);setBudgetForm(null);}} onDelete={id=>{deleteBudget(id);setBudgetForm(null);}} onClose={()=>setBudgetForm(null)}/>}
        {goalForm&&<GoalSheet goal={goalForm==='new'?null:goalForm} onSave={g=>{saveGoal(g);setGoalForm(null);}} onDelete={id=>{deleteGoal(id);setGoalForm(null);}} onClose={()=>setGoalForm(null)}/>}
      </div>
      {!hideNav&&<BottomNav screen={screen} setScreen={setScreen}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
